version: "3.8"
services:
  frontend:
    environment:
      - INFISICAL_API_URL=${INFISICAL_API_URL}
      - INFISICAL_TOKEN=${INFISICAL_TOKEN}
      - PROJECT_ID=${PROJECT_ID}
      - ENV=${ENV}
    image: ${REGISTRY}/${PROJECT}/frontend:${IMG_TAG}
    restart: unless-stopped
    networks:
      - app_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - frontend-static:/app/build
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ "CMD", "ls", "/app/build/index.html" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./frontend/nginx/master.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - frontend-static:/usr/share/nginx/html:ro
    depends_on:
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app_net:
    external: true
    name: ${NETWORK_NAME}

volumes:
  frontend-static:


