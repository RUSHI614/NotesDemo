version: "3.8"
services:
  frontend:
    image: rushi614/notes-frontend:${IMG_TAG}
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - frontend-static:/app/build
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

